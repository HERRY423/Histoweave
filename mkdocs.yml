site_name: HistoWeave
site_description: Open-source orchestration & evaluation platform for spatial transcriptomics.
repo_url: https://github.com/histoweave-spatial/histoweave
theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - API Reference: api.md
  - Quickstart: quickstart.md
  - Spatial pipeline compiler: compiler.md
  - Research method incubator: research-methods.md
  - Guides:
      - Method selection: method-selection.md
      - FAQ: faq.md
      - Troubleshooting: troubleshooting.md
  - Tutorials:
      - Real Visium (DLPFC): tutorials/01_real_visium_dlpfc.md
      - Custom plugin development: tutorials/02_custom_plugin_development.md
      - Batch-effect correction: tutorials/03_batch_effect_correction.md
      - Xenium & MERFISH (imaging): tutorials/04_xenium_merfish.md
  - Architecture: architecture.md
  - Method lifecycle: method-lifecycle.md
  - Concepts: concepts.md
  - Roadmap: roadmap.md
  - Compiler capability gaps: COMPILER_GAPS.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_root_full_path: false
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            show_bases: false
            members_order: source
            group_by_category: true
            show_category_heading: true
            filters:
              - "!^_"
              - "^__init__$"
