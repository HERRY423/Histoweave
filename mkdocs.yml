site_name: HistoWeave
site_description: Open-source orchestration & evaluation platform for spatial transcriptomics.
repo_url: https://github.com/histoweave-spatial/histoweave
theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - API Reference: api.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Method lifecycle: method-lifecycle.md
  - Concepts: concepts.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
