name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality_build:
    name: quality and build gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install quality and build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"
          python -m pip install pip-audit

      - name: Audit Python dependencies
        run: python -m pip_audit

      - name: Build documentation
        run: mkdocs build --strict

      - name: Lint
        run: ruff check .

      - name: Type-check
        run: mypy src

      - name: Build distributions
        run: python -m build

      - name: Validate built wheel dependencies
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -m pip check

  test:
    needs: quality_build
    name: test (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Clean stale pytest temp dirs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $toRemove = Get-ChildItem -Path "$env:USERPROFILE\AppData\Local\Temp" -Filter "pytest-*" -Directory -ErrorAction SilentlyContinue
          if ($toRemove) {
            $toRemove | ForEach-Object { Remove-Item -Recurse -Force $_.FullName -ErrorAction SilentlyContinue }
            Write-Host "Cleaned $($toRemove.Count) stale pytest temp dir(s)"
          } else {
            Write-Host "No stale pytest temp dirs found"
          }

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: pytest --cov=histoweave --cov-report=term-missing --cov-fail-under=80

  benchmark:
    name: benchmark regression gate
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      # The harness gates releases against performance regressions (plan section 7).
      - name: Domain-detection leaderboard
        run: histoweave benchmark --min-score 0.90 --fail-on-error --out benchmark.json
