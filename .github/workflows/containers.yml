name: Publish containers

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "src/**"
      - "pyproject.toml"
      - "workflows/containers/**"
      - ".github/workflows/containers.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: histoweave-python
            context: .
            dockerfile: workflows/containers/histoweave-python/Dockerfile
          - name: histoweave-r
            context: workflows/containers/histoweave-r
            dockerfile: workflows/containers/histoweave-r/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
          labels: |
            org.opencontainers.image.title=${{ matrix.name }}
            org.opencontainers.image.description=HistoWeave spatial transcriptomics ${{ matrix.name }} container

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
          provenance: mode=max
          sbom: true
